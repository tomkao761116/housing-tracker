<!-- Park Line Art Background Pattern -->
<!-- Trees, paths, benches - subtle line art for website background -->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <style>
      .line { fill: none; stroke: rgba(99, 125, 86, 0.08); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .line-thin { fill: none; stroke: rgba(99, 125, 86, 0.05); stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
      .fill-light { fill: rgba(99, 125, 86, 0.03); stroke: none; }
    </style>
  </defs>

  <!-- Ground path (winding) -->
  <path class="line" d="M -50 450 Q 100 420, 200 440 T 400 430 T 600 450 T 850 420" />
  <path class="line-thin" d="M -50 460 Q 100 430, 200 450 T 400 440 T 600 460 T 850 430" />

  <!-- Tree 1 - Large oak (left) -->
  <g transform="translate(80, 200)">
    <!-- Trunk -->
    <path class="line" d="M 30 150 L 30 250 M 30 200 Q 20 220, 10 240 M 30 220 Q 40 235, 50 250" />
    <!-- Canopy -->
    <path class="line" d="M 30 150 Q -10 120, 10 80 Q 30 40, 70 60 Q 100 80, 80 120 Q 60 150, 30 150" />
    <path class="line-thin" d="M 30 150 Q 0 100, 20 70 Q 40 30, 70 50 Q 90 70, 70 100 Q 50 130, 30 150" />
    <!-- Branches -->
    <path class="line-thin" d="M 30 120 Q 10 100, -5 90 M 30 110 Q 50 90, 65 80 M 20 130 Q 5 115, -10 110" />
  </g>

  <!-- Tree 2 - Pine (center-left) -->
  <g transform="translate(250, 180)">
    <!-- Trunk -->
    <path class="line" d="M 25 170 L 25 250" />
    <!-- Layers -->
    <path class="line" d="M 25 80 L -10 140 L 60 140 Z" />
    <path class="line" d="M 25 100 L -15 160 L 65 160 Z" />
    <path class="line" d="M 25 120 L -20 180 L 70 180 Z" />
    <path class="line-thin" d="M 25 90 L -5 130 L 55 130 Z" />
  </g>

  <!-- Tree 3 - Willow (right) -->
  <g transform="translate(550, 160)">
    <!-- Trunk -->
    <path class="line" d="M 40 190 L 40 280" />
    <!-- Drooping branches -->
    <path class="line" d="M 40 190 Q 10 160, -20 180 Q -30 200, -10 220" />
    <path class="line" d="M 40 190 Q 20 150, 0 170 Q -10 190, 10 210" />
    <path class="line" d="M 40 190 Q 60 150, 80 170 Q 90 190, 70 210" />
    <path class="line" d="M 40 190 Q 70 160, 100 180 Q 110 200, 90 220" />
    <path class="line-thin" d="M 40 190 Q 30 140, 20 160 Q 10 180, 25 200" />
    <path class="line-thin" d="M 40 190 Q 50 140, 60 160 Q 70 180, 55 200" />
  </g>

  <!-- Tree 4 - Small bush (far right) -->
  <g transform="translate(700, 250)">
    <path class="line" d="M 20 80 Q -10 60, 0 30 Q 10 0, 40 10 Q 70 20, 60 50 Q 50 80, 20 80" />
    <path class="line-thin" d="M 20 70 Q -5 50, 5 25 Q 15 5, 40 15 Q 65 25, 55 45 Q 45 65, 20 70" />
    <path class="line" d="M 20 80 L 20 100" />
  </g>

  <!-- Bench (center) -->
  <g transform="translate(400, 350)">
    <!-- Seat -->
    <path class="line" d="M 0 30 L 60 30" />
    <path class="line" d="M 5 25 L 55 25" />
    <!-- Back -->
    <path class="line" d="M 0 30 L 0 0 L 60 0 L 60 30" />
    <path class="line-thin" d="M 15 0 L 15 30 M 30 0 L 30 30 M 45 0 L 45 30" />
    <!-- Legs -->
    <path class="line" d="M 10 30 L 10 50 M 50 30 L 50 50" />
    <path class="line" d="M 5 50 L 15 50 M 45 50 L 55 50" />
  </g>

  <!-- Path stones -->
  <g transform="translate(0, 400)">
    <ellipse class="fill-light" cx="150" cy="20" rx="15" ry="8" />
    <ellipse class="fill-light" cx="300" cy="15" rx="12" ry="7" />
    <ellipse class="fill-light" cx="450" cy="25" rx="18" ry="9" />
    <ellipse class="fill-light" cx="600" cy="18" rx="14" ry="7" />
  </g>

  <!-- Small flowers/grass -->
  <g transform="translate(0, 0)">
    <path class="line-thin" d="M 150 300 Q 152 290, 155 285 M 155 285 Q 158 290, 160 300" />
    <path class="line-thin" d="M 350 320 Q 352 310, 355 305 M 355 305 Q 358 310, 360 320" />
    <path class="line-thin" d="M 500 280 Q 502 270, 505 265 M 505 265 Q 508 270, 510 280" />
    <circle class="fill-light" cx="155" cy="283" r="3" />
    <circle class="fill-light" cx="355" cy="303" r="3" />
    <circle class="fill-light" cx="505" cy="263" r="3" />
  </g>

  <!-- Bird (simple) -->
  <g transform="translate(650, 100)">
    <path class="line-thin" d="M 0 0 Q 10 -10, 20 0 Q 30 -10, 40 0" />
    <path class="line-thin" d="M 20 0 L 20 5" />
  </g>

  <!-- Clouds -->
  <g transform="translate(100, 50)">
    <path class="line-thin" d="M 0 20 Q -10 10, 0 0 Q 10 -10, 20 0 Q 30 -15, 50 -10 Q 70 -15, 80 0 Q 90 10, 80 20 Z" />
  </g>
  <g transform="translate(500, 30)">
    <path class="line-thin" d="M 0 15 Q -8 8, 0 0 Q 8 -8, 15 0 Q 25 -12, 40 -8 Q 55 -12, 60 0 Q 68 8, 60 15 Z" />
  </g>
</svg>
