<!-- House Divider - decorative line with house elements -->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="40" viewBox="0 0 200 40">
  <defs>
    <style>
      .line { stroke: rgba(99, 125, 86, 0.3); stroke-width: 1; fill: none; }
      .house { fill: none; stroke: rgba(99, 125, 86, 0.4); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Left line -->
  <line class="line" x1="0" y1="20" x2="70" y2="20" />
  
  <!-- Center house -->
  <g transform="translate(85, 5)">
    <path class="house" d="M 15 0 L 0 12 L 5 12 L 5 22 L 25 22 L 25 12 L 30 12 Z" />
    <rect class="house" x="10" y="15" width="10" height="7" />
  </g>
  
  <!-- Right line -->
  <line class="line" x1="130" y1="20" x2="200" y2="20" />
</svg>
